<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<title>TripSplit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #181b24;
  --bg3: #1e2230;
  --card: #232736;
  --card2: #2a2f42;
  --border: #2e334a;
  --accent: #6c8fff;
  --accent2: #4ecdc4;
  --accent3: #ff6b9d;
  --accent4: #ffd166;
  --text: #e8eaf2;
  --text2: #9aa0bc;
  --text3: #5a6080;
  --success: #4ade80;
  --danger: #f87171;
  --warning: #fbbf24;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Sarabun', sans-serif; font-size: 15px;
}

/* ─── LAYOUT ─── */
#app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
#screen-container { flex: 1; overflow: hidden; position: relative; }
.screen { 
  position: absolute; inset: 0; overflow-y: auto; 
  padding: 0 0 calc(var(--nav-h) + var(--safe-bottom) + 8px);
  display: none; -webkit-overflow-scrolling: touch;
}
.screen.active { display: block; }

/* ─── BOTTOM NAV ─── */
#bottom-nav {
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--bg2); border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  position: relative; z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; cursor: pointer;
  color: var(--text3); transition: color 0.2s; border: none; background: none;
  font-family: 'Sarabun', sans-serif; font-size: 10px;
  padding-top: 8px;
}
.nav-item svg { width: 22px; height: 22px; transition: transform 0.2s; }
.nav-item.active { color: var(--accent); }
.nav-item.active svg { transform: translateY(-2px); }
.nav-item span { font-weight: 500; }

/* ─── TOP BAR ─── */
.top-bar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); border-bottom: 1px solid var(--border);
  padding: 12px 16px; display: flex; align-items: center; gap: 12px;
}
.top-bar h1 { font-family: 'Prompt', sans-serif; font-size: 20px; font-weight: 600; flex: 1; }
.top-bar .btn-icon { 
  width: 38px; height: 38px; border-radius: 50%; background: var(--card);
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text2);
}

/* ─── CARDS ─── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin: 12px 16px 0;
}
.card-sm { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }

/* ─── BUTTONS ─── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 20px; border-radius: 12px; font-family: 'Sarabun', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.15s; -webkit-appearance: none;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { opacity: 0.85; transform: scale(0.97); }
.btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(248,113,113,0.15); color: var(--danger); border: 1px solid rgba(248,113,113,0.3); }
.btn-success { background: rgba(74,222,128,0.15); color: var(--success); border: 1px solid rgba(74,222,128,0.3); }
.btn-full { width: 100%; }

/* ─── FAB ─── */
#fab {
  position: fixed; right: 20px; bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  box-shadow: 0 4px 20px rgba(108,143,255,0.4);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 90; border: none;
  transition: transform 0.2s, box-shadow 0.2s;
}
#fab:active { transform: scale(0.92); }
#fab svg { width: 26px; height: 26px; color: #fff; }
#fab.hidden { display: none; }

/* ─── FORMS ─── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input {
  width: 100%; padding: 12px 14px; background: var(--bg3); 
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: 'Sarabun', sans-serif; font-size: 15px;
  -webkit-appearance: none; outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
select.form-input { cursor: pointer; }
textarea.form-input { resize: none; min-height: 80px; }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border-radius: 24px 24px 0 0;
  border: 1px solid var(--border); border-bottom: none;
  width: 100%; max-width: 600px; max-height: 92dvh;
  overflow-y: auto; padding-bottom: calc(var(--safe-bottom) + 20px);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
.modal-header { padding: 16px 20px 12px; display: flex; align-items: center; gap: 12px; }
.modal-header h2 { font-family: 'Prompt', sans-serif; font-size: 18px; font-weight: 600; flex: 1; }
.modal-body { padding: 0 20px; }

/* ─── CHIP ─── */
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--bg3);
  color: var(--text2); transition: all 0.15s; white-space: nowrap;
}
.chip.selected { border-color: var(--accent); background: rgba(108,143,255,0.15); color: var(--accent); }

/* ─── AVATAR ─── */
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Prompt', sans-serif; font-size: 14px; font-weight: 600;
  flex-shrink: 0; color: #fff;
}
.avatar-sm { width: 28px; height: 28px; font-size: 11px; }
.avatar-lg { width: 48px; height: 48px; font-size: 18px; }

/* ─── BADGE ─── */
.badge {
  display: inline-flex; align-items: center; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 600;
}

/* ─── AUTH SCREEN ─── */
#auth-screen {
  position: fixed; inset: 0; background: var(--bg); z-index: 300;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; overflow-y: auto;
  padding: 40px 24px 40px;
  -webkit-overflow-scrolling: touch;
}
.auth-logo { 
  width: 64px; height: 64px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px; box-shadow: 0 8px 32px rgba(108,143,255,0.4);
  flex-shrink: 0;
}
.auth-logo svg { width: 44px; height: 44px; color: #fff; }
.auth-title { font-family: 'Prompt', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.auth-sub { color: var(--text2); font-size: 13px; margin-bottom: 24px; text-align: center; }

/* ─── EXPENSE ITEM ─── */
.expense-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.expense-item:last-child { border-bottom: none; }
.expense-item:active { background: var(--card2); }
.expense-icon {
  width: 42px; height: 42px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-weight: 600; font-size: 14px; truncate: ellipsis; white-space: nowrap; overflow: hidden; }
.expense-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
.expense-amount { font-family: 'Prompt', sans-serif; font-size: 15px; font-weight: 600; text-align: right; flex-shrink: 0; }

/* ─── PROGRESS BAR ─── */
.progress-bar { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

/* ─── STAT GRID ─── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { background: var(--bg3); border-radius: var(--radius-sm); padding: 14px; border: 1px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stat-value { font-family: 'Prompt', sans-serif; font-size: 20px; font-weight: 700; }

/* ─── CALENDAR ─── */
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-header { text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); padding: 4px 0; }
.cal-day {
  aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  font-size: 12px; font-weight: 500; transition: all 0.15s; position: relative;
}
.cal-day.empty { opacity: 0; pointer-events: none; }
.cal-day.today { border: 1.5px solid var(--accent); }
.cal-day.has-expense { color: #fff; }
.cal-day.selected { outline: 2px solid var(--accent4); outline-offset: 2px; }
.cal-day-num { font-size: 12px; font-weight: 600; }
.cal-day-amt { font-size: 8px; opacity: 0.8; margin-top: 1px; }

/* ─── SETTLEMENT ─── */
.settlement-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.settlement-item:last-child { border-bottom: none; }
.settlement-arrow { color: var(--accent); font-size: 20px; }

/* ─── PIE CHART ─── */
.pie-chart-wrapper { position: relative; width: 140px; height: 140px; margin: 0 auto; }
.pie-legend { display: flex; flex-direction: column; gap: 8px; }
.pie-legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.pie-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ─── NOTES ─── */
.note-section { margin-bottom: 16px; }
.note-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-weight: 600; }
.note-content { 
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px; min-height: 80px; color: var(--text); font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; cursor: pointer;
}
.note-content[contenteditable="true"] { outline: 1px solid var(--accent); }

/* ─── MEMBER CHECKBOX ─── */
.member-check-list { display: flex; flex-direction: column; gap: 8px; }
.member-check-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: var(--bg3); border-radius: var(--radius-sm); cursor: pointer;
  border: 1.5px solid var(--border); transition: all 0.15s;
}
.member-check-item.checked { border-color: var(--accent); background: rgba(108,143,255,0.1); }
.member-check-item .name { flex: 1; font-size: 14px; font-weight: 500; }
.checkmark { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.member-check-item.checked .checkmark { background: var(--accent); border-color: var(--accent); }

/* ─── TOAST ─── */
#toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 20px; z-index: 999; font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow); transition: transform 0.3s; white-space: nowrap;
  display: flex; align-items: center; gap: 8px;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* ─── LOADER ─── */
.loader { display: flex; align-items: center; justify-content: center; padding: 40px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── MISC ─── */
.divider { height: 1px; background: var(--border); margin: 12px 0; }
.section-title { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; padding: 16px 16px 8px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 12px; text-align: center; }
.empty-state svg { width: 48px; height: 48px; color: var(--text3); opacity: 0.5; }
.empty-state p { color: var(--text2); font-size: 14px; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.flex { display: flex; } .flex-1 { flex: 1; } .items-center { align-items: center; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; }
.text-right { text-align: right; } .text-sm { font-size: 13px; } .text-xs { font-size: 11px; }
.text-muted { color: var(--text2); } .text-success { color: var(--success); } .text-danger { color: var(--danger); } .text-accent { color: var(--accent); }
.font-bold { font-weight: 700; } .font-prompt { font-family: 'Prompt', sans-serif; }
.mt-4 { margin-top: 4px; } .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; }
.p-16 { padding: 16px; } .px-16 { padding-left: 16px; padding-right: 16px; }
.rounded { border-radius: var(--radius-sm); }
img.receipt-thumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex-shrink: 0; cursor: pointer; }


.pin-box {
  width: 56px; height: 64px; border-radius: 14px; border: 2px solid var(--border);
  background: var(--bg3); color: var(--text); font-family: 'Prompt', sans-serif;
  font-size: 28px; font-weight: 700; text-align: center;
  outline: none; transition: border-color 0.2s; caret-color: transparent;
}
.pin-box:focus { border-color: var(--accent); background: rgba(108,143,255,0.08); }


.trip-tab {
  padding: 10px 16px; border: none; background: none;
  color: var(--text2); font-family: 'Sarabun', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap;
  transition: all 0.2s;
}
.trip-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>


<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="36" height="36"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <div class="auth-title" style="font-size:26px;margin-bottom:4px;">TripSplit</div>
  <div class="auth-sub" style="font-size:13px;margin-bottom:28px;">บันทึกรายจ่ายทริปกับเพื่อน · หารค่าใช้จ่ายได้ง่ายๆ</div>

  <div style="width:100%;max-width:360px;">
    <div class="form-group">
      <label class="form-label">เลือกผู้ใช้งาน</label>
      <select id="login-user-select" class="form-input" style="font-size:16px;">
        <option value="">— กรุณาเลือก —</option>
        <option value="admin">👑 Admin</option>
      </select>
    </div>

    <div id="pin-section">
      <div class="form-group">
        <label class="form-label">PIN 4 หลัก</label>
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:4px;">
          <input class="pin-box" id="pin0" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]">
          <input class="pin-box" id="pin1" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]">
          <input class="pin-box" id="pin2" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]">
          <input class="pin-box" id="pin3" maxlength="1" type="password" inputmode="numeric" pattern="[0-9]">
        </div>
      </div>
      <div id="login-error" style="color:var(--danger);font-size:13px;margin-bottom:12px;display:none;text-align:center;"></div>
      <button id="do-login-btn" class="btn btn-primary btn-full" onclick="window.doLogin()">เข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<style>

  background: var(--bg3); color: var(--text); font-family: 'Prompt', sans-serif;

  outline: none; transition: border-color 0.2s; caret-color: transparent;
}
.pin-box:focus { border-color: var(--accent); background: rgba(108,143,255,0.08); }
</style>

<!-- MAIN APP -->

  <div id="screen-container">

      <span>ทริป</span>

      <span>รายจ่าย</span>

const initializeApp  = (cfg) => firebase.initializeApp(cfg);

const ADMIN_ID = "admin";

// ─── STATE ───
let currentUser = null;   // { id, name, role:'admin'|'member', allowedTrips:[] }
let allUsers = {};        // all users from DB (admin only)

function getColor(i) { return COLORS[i % COLORS.length]; }
function getInitial(name) { return name ? name[0].toUpperCase() : '?'; }
function isAdmin() { return currentUser?.role === 'admin'; }

// ─── SESSION ───
function saveSession(user) { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }
function loadSession() {
  try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
}
function clearSession() { localStorage.removeItem(SESSION_KEY); }

// ─── BOOTSTRAP ───
async function bootstrap() {
  // Clear any stale/old sessions (email-based or missing role)
  const session = loadSession();
  if (session && (!session.role || !session.id || session.email)) {
    clearSession();
    showAuthScreen();
    return;
  }
  if (session?.id && session?.role) {
    if (session.role === 'admin') {
      currentUser = { id: ADMIN_ID, name: 'Admin', role: 'admin', allowedTrips: '__all__' };
      onLoginSuccess();
      return;
    } else {
      try {
        const snap = await get(ref(db, `appUsers/${session.id}`));
        if (snap.exists() && snap.val().role !== 'admin') {
          currentUser = { ...snap.val(), id: session.id };
          onLoginSuccess();
          return;
        }
      } catch(e) {}
    }
  }
  showAuthScreen();
}

// ─── AUTH SCREEN ───
function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  loadUserList();
}

async function loadUserList() {
  const sel = document.getElementById('login-user-select');
  if (!sel) return;

  // Reset to just the two hardcoded options (blank + Admin)
  sel.innerHTML = '<option value="">— กรุณาเลือก —</option><option value="admin">👑 Admin</option>';

  // Append members from DB
  try {
    const snap = await get(ref(db, 'appUsers'));
    const users = snap.val() || {};
    Object.entries(users)
      .filter(([id, u]) => id !== ADMIN_ID && u.role !== 'admin')
      .sort((a,b) => (a[1].name||'').localeCompare(b[1].name||'','th'))
      .forEach(([id, u]) => {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = u.name;
        sel.appendChild(opt);
      });
  } catch(e) {
    console.warn('Could not load users:', e);
  }
}

function onUserSelectChange() {
  const val = document.getElementById('login-user-select').value;
  document.getElementById('pin-section').style.display = val ? 'block' : 'none';
  document.getElementById('login-error').style.display = 'none';
  [0,1,2,3].forEach(i => { document.getElementById(`pin${i}`).value = ''; });
  if (val) {
    setTimeout(() => document.getElementById('pin0').focus(), 100);
    initPinBoxes();
  }
}

function initPinBoxes() {
  [0,1,2,3].forEach(i => {
    const box = document.getElementById(`pin${i}`);
    box.oninput = (e) => {
      const val = e.target.value.replace(/[^0-9]/g,'');
      box.value = val.slice(-1);
      if (val && i < 3) document.getElementById(`pin${i+1}`).focus();
      if (i === 3 && val) window.doLogin();
    };
    box.onkeydown = (e) => {
      if (e.key === 'Backspace' && !box.value && i > 0) document.getElementById(`pin${i-1}`).focus();
    };
  });
}

window.doLogin = async () => {
  const userId = document.getElementById('login-user-select').value;
  const pin = [0,1,2,3].map(i => document.getElementById(`pin${i}`).value).join('');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!userId) { errEl.textContent = 'กรุณาเลือกผู้ใช้งาน'; errEl.style.display = 'block'; return; }
  if (pin.length !== 4) { errEl.textContent = 'กรุณากรอก PIN ให้ครบ 4 หลัก'; errEl.style.display = 'block'; return; }

  // Admin check
  if (userId === ADMIN_ID) {
    if (pin !== ADMIN_PIN) {
      errEl.textContent = 'PIN ไม่ถูกต้อง';
      errEl.style.display = 'block';
      [0,1,2,3].forEach(i => { document.getElementById(`pin${i}`).value = ''; });
      document.getElementById('pin0').focus();
      return;
    }
    await set(ref(db, `appUsers/${ADMIN_ID}`), {
      name: 'Admin', role: 'admin', pin: ADMIN_PIN, allowedTrips: '__all__'
    });
    currentUser = { id: ADMIN_ID, name: 'Admin', role: 'admin', allowedTrips: '__all__' };
    saveSession(currentUser);
    onLoginSuccess();
    return;
  }

  // Regular user
  const snap = await get(ref(db, `appUsers/${userId}`));
  if (!snap.exists()) { errEl.textContent = 'ไม่พบผู้ใช้งาน'; errEl.style.display = 'block'; return; }
  const userData = snap.val();
  if (userData.pin !== pin) {
    errEl.textContent = 'PIN ไม่ถูกต้อง';
    errEl.style.display = 'block';
    [0,1,2,3].forEach(i => { document.getElementById(`pin${i}`).value = ''; });
    document.getElementById('pin0').focus();
    return;
  }
  currentUser = { ...userData, id: userId };
  saveSession(currentUser);
  onLoginSuccess();
};

// ─── EXCHANGE RATES ───
async function loadRates() {
  try {
    const r = await fetch('https://api.exchangerate-api.com/v4/latest/THB');
    const data = await r.json();
    exchangeRates = data.rates;
  } catch(e) { exchangeRates = {}; }
}

function convertToBase(amount, fromCurrency, baseCurrency) {
  if (fromCurrency === baseCurrency) return amount;
  if (!exchangeRates[fromCurrency] || !exchangeRates[baseCurrency]) return amount;
  const inTHB = amount / exchangeRates[fromCurrency];
  return inTHB * exchangeRates[baseCurrency];
}

function renderTripCard(id, trip) {
  const snap = allTrips[id];
  const members = trip.members ? Object.values(trip.members) : [];
  const expenses = trip.expenses ? Object.values(trip.expenses) : [];
  const base = trip.currency || 'THB';
  const totalSpent = expenses.reduce((s, e) => s + convertToBase(e.amount || 0, e.currency || base, base), 0);
  const budget = trip.budget || 0;
  const pct = budget > 0 ? Math.min(100, (totalSpent/budget)*100) : 0;
  const avatars = members.slice(0,4).map((m,i) => `<div class="avatar avatar-sm" style="background:${getColor(i)};margin-left:${i>0?'-8px':'0'};border:2px solid var(--bg2);">${getInitial(m.name||m.userId)}</div>`).join('');

  return `<div class="card" onclick="openTrip('${id}')" style="cursor:pointer;transition:transform 0.15s;" ontouchstart="this.style.transform='scale(0.98)'" ontouchend="this.style.transform=''">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;">
      <div style="flex:1;min-width:0;">
        <div style="font-family:'Prompt',sans-serif;font-size:17px;font-weight:600;">${trip.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px;">${formatDateRange(trip.startDate, trip.endDate)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px;">
        <div style="font-family:'Prompt',sans-serif;font-size:18px;font-weight:700;color:var(--accent4);">${formatMoney(totalSpent, base)}</div>
        <div style="font-size:11px;color:var(--text3);">${expenses.length} รายการ</div>
      </div>
    </div>
    ${budget > 0 ? `<div class="progress-bar mb-8"><div class="progress-fill" style="width:${pct}%;background:${pct>85?'var(--danger)':pct>60?'var(--warning)':'var(--success)'}"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:12px;"><span>ใช้ไป ${pct.toFixed(0)}%</span><span>Budget: ${formatMoney(budget,base)}</span></div>` : ''}
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;">${avatars}${members.length>4?`<div class="avatar avatar-sm" style="background:var(--card2);margin-left:-8px;border:2px solid var(--bg2);font-size:10px;color:var(--text2);">+${members.length-4}</div>`:''}</div>
      <div style="text-align:right;">
        <div style="font-size:12px;color:var(--text2);">${members.length} คน · ${base}</div>
        ${isAdmin() && trip.tripCode ? `<div style="font-size:11px;color:var(--text3);letter-spacing:2px;font-family:'Prompt',sans-serif;margin-top:2px;">🔑 ${trip.tripCode}</div>` : ''}
      </div>
    </div>
  </div>`;
}

function generateTripCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

window.saveTrip = async () => {
  const name = document.getElementById('trip-name').value.trim();
  if (!name) { showToast('❌ กรุณาใส่ชื่อทริป'); return; }
  const tripCode = editingTripId ? (allTrips[editingTripId]?.tripCode || generateTripCode()) : generateTripCode();

  // Get selected members
  const selectedUserIds = [...document.querySelectorAll('#member-list .member-check-item.checked')]
    .map(el => el.getAttribute('onclick').match(/'([^']+)'/)[1]);

  // Build members object from appUsers
  const usersSnap = await get(ref(db, 'appUsers'));
  const allUsersData = usersSnap.val() || {};
  const members = {};
  selectedUserIds.forEach((uid, i) => {
    const u = allUsersData[uid];
    if (u) members[`m_${uid}`] = { userId: uid, name: u.name };
  });

  const data = {
    name, tripCode,
    startDate: document.getElementById('trip-start').value,
    endDate: document.getElementById('trip-end').value,
    currency: document.getElementById('trip-currency').value,
    budget: parseFloat(document.getElementById('trip-budget').value) || 0,
    adminId: ADMIN_ID,
    createdAt: editingTripId ? (allTrips[editingTripId]?.createdAt || Date.now()) : Date.now(),
    members
  };

  const tid = editingTripId || push(ref(db, 'trips')).key;
  if (editingTripId && allTrips[editingTripId]?.expenses) data.expenses = allTrips[editingTripId].expenses;
  if (editingTripId && allTrips[editingTripId]?.notes) data.notes = allTrips[editingTripId].notes;
  await set(ref(db, `trips/${tid}`), data);

  // Also update allowedTrips for each selected user
  for (const uid of selectedUserIds) {
    const uSnap = await get(ref(db, `appUsers/${uid}`));
    const uData = uSnap.val() || {};
    const existing = Array.isArray(uData.allowedTrips) ? uData.allowedTrips : [];
    if (!existing.includes(tid)) {
      await set(ref(db, `appUsers/${uid}/allowedTrips`), [...existing, tid]);
    }
  }

  closeModal('modal-trip');
  showToast('✅ บันทึกทริปแล้ว');
};

function getTripMembers() {
  if (!currentTrip) return [];
  // Admin is always first member
  const adminMember = { userId: ADMIN_ID, name: 'Admin (ฉัน)' };
  const members = currentTrip.members ? Object.values(currentTrip.members) : [];
  const filtered = members.filter(m => m.userId !== ADMIN_ID);
  return [adminMember, ...filtered];
}

function getMemberName(userId) {
  if (userId === ADMIN_ID) return 'Admin';
  const m = getTripMembers().find(m => m.userId === userId);
  return m?.name || userId;
}

function renderExpensesList() {
  const expenses = currentTrip?.expenses ? Object.entries(currentTrip.expenses) : [];
  const base = currentTrip?.currency || 'THB';
  expenses.sort((a,b) => (b[1].date||'') >= (a[1].date||'') ? 1 : -1);

  if (expenses.length === 0) {
    document.getElementById('expenses-list').innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg><p>ยังไม่มีรายจ่าย<br>กดปุ่ม + เพื่อเพิ่ม</p></div>`;
    return;
  }

  const byDate = {};
  expenses.forEach(([id, e]) => {
    const d = e.date || 'ไม่ระบุวัน';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push([id, e]);
  });

  let html = '';
  Object.entries(byDate).sort((a,b) => b[0]>a[0]?1:-1).forEach(([date, exps]) => {
    const dayTotal = exps.reduce((s,[,e]) => s+convertToBase(e.amount||0,e.currency||base,base),0);
    html += `<div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>${formatDisplayDate(date)}</span>
      <span style="color:var(--accent4);font-family:'Prompt',sans-serif;">${formatMoney(dayTotal,base)}</span>
    </div>`;
    exps.forEach(([id, e]) => {
      const payerName = e.payerName || getMemberName(e.payerId) || '?';
      const convertedAmt = convertToBase(e.amount||0, e.currency||base, base);
      html += `<div class="expense-item" onclick="openExpenseDetail('${id}')">
        <div class="expense-icon" style="background:${getCatBg(e.category)}">${getCatEmoji(e.category)}</div>
        <div class="expense-info">
          <div class="expense-name">${e.name||'ไม่ระบุ'}</div>
          <div class="expense-meta">${e.category||''} · ${payerName}${e.location?' · 📍'+e.location:''}</div>
        </div>
        <div>
          <div class="expense-amount">${formatMoney(e.amount||0,e.currency||base)}</div>
          ${e.currency!==base?`<div style="font-size:11px;color:var(--text3);text-align:right;">≈${formatMoney(convertedAmt,base)}</div>`:''}
          ${e.receiptUrl?'<div style="text-align:right;font-size:16px;margin-top:2px;">🖼️</div>':''}
        </div>
      </div>`;
    });
  });
  document.getElementById('expenses-list').innerHTML = html;
}

window.getLocation = () => {
  if (!navigator.geolocation) { showToast('❌ เบราว์เซอร์ไม่รองรับ GPS'); return; }
  showToast('📍 กำลังระบุตำแหน่ง...');
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lon} = pos.coords;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=th`);
      const data = await r.json();
      const place = data.address?.city||data.address?.town||data.address?.village||data.address?.country||`${lat.toFixed(4)},${lon.toFixed(4)}`;
      document.getElementById('exp-location').value = place;
      showToast('📍 '+place);
    } catch { document.getElementById('exp-location').value = `${lat.toFixed(4)},${lon.toFixed(4)}`; }
  }, () => showToast('❌ ไม่สามารถเข้าถึง GPS'));
};

window.handleReceipt = async (input) => {
  const file = input.files[0]; if (!file) return;
  const MAX = 1024*1024;
  const dataUrl = await new Promise(res => { const r=new FileReader(); r.onload=e=>res(e.target.result); r.readAsDataURL(file); });
  receiptDataUrl = file.size > MAX ? await compressImage(dataUrl, MAX) : dataUrl;
  document.getElementById('receipt-img').src = receiptDataUrl;
  document.getElementById('receipt-preview').style.display = 'block';
};

function compressImage(dataUrl, maxBytes) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas'); let q=0.9;
      const tryCompress = () => {
        const scale = Math.min(1, Math.sqrt(maxBytes/(dataUrl.length*0.75)));
        canvas.width=img.width*scale; canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const result = canvas.toDataURL('image/jpeg',q);
        if (result.length*0.75>maxBytes && q>0.3) { q-=0.1; tryCompress(); } else res(result);
      };
      tryCompress();
    };
    img.src = dataUrl;
  });
}

window.clearReceipt = () => {
  receiptDataUrl = null;
  document.getElementById('receipt-preview').style.display='none';

window.saveExpense = async () => {

// ─── CALENDAR ───
function renderCalendar() {
  const container = document.getElementById('calendar-container');
  if (!currentTrip) return;
  const expenses = currentTrip.expenses ? Object.values(currentTrip.expenses) : [];
  const base = currentTrip.currency||'THB';
  const today = new Date();
  let month = today.getMonth(), year = today.getFullYear();
  if (currentTrip.startDate) { const d=new Date(currentTrip.startDate); month=d.getMonth(); year=d.getFullYear(); }

  const byDate={};
  expenses.forEach(e => { if(!e.date) return; byDate[e.date]=(byDate[e.date]||0)+convertToBase(e.amount||0,e.currency||base,base); });
  const maxAmt = Math.max(...Object.values(byDate),1);

  function renderMonth(m,y) {
    const first=new Date(y,m,1), daysInMonth=new Date(y,m+1,0).getDate(), startDay=first.getDay();
    const monthName=first.toLocaleString('th-TH',{month:'long',year:'numeric'});
    let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <button onclick="changeMonth(-1)" style="background:var(--card2);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;">‹</button>
      <div style="font-family:'Prompt',sans-serif;font-weight:600;font-size:16px;">${monthName}</div>
      <button onclick="changeMonth(1)" style="background:var(--card2);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;">›</button>
    </div><div class="calendar-grid">`;
    ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d=>{html+=`<div class="cal-header">${d}</div>`;});
    for(let i=0;i<startDay;i++) html+='<div class="cal-day empty"></div>';
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const amt=byDate[ds]||0, isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
      const intensity=amt>0?Math.max(0.2,amt/maxAmt):0;
      const amtStr=amt>0?(amt>=1000?(amt/1000).toFixed(1)+'k':Math.round(amt)+''):'';
      html+=`<div class="cal-day ${isToday?'today':''} ${amt>0?'has-expense':''}" style="background:${amt>0?`rgba(108,143,255,${intensity})`:'transparent'};" onclick="calDayClick('${ds}')">
        <div class="cal-day-num">${d}</div>${amtStr?`<div class="cal-day-amt">${amtStr}</div>`:''}
      </div>`;
    }
    html+='</div>';
    const monthTotal=Object.entries(byDate).filter(([d])=>d.startsWith(`${y}-${String(m+1).padStart(2,'0')}`)).reduce((s,[,v])=>s+v,0);
    html+=`<div id="cal-day-detail" style="margin-top:16px;"></div>
    <div class="card" style="margin:16px 0 0;background:var(--bg3);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--text2);font-size:13px;">รวมเดือนนี้</span>
        <span style="font-family:'Prompt',sans-serif;font-size:18px;font-weight:700;color:var(--accent4);">${formatMoney(monthTotal,base)}</span>
      </div>
    </div>`;
    container.innerHTML=html;
  }

  window.changeMonth=(d)=>{ month+=d; if(month>11){month=0;year++;}if(month<0){month=11;year--;} renderMonth(month,year); };
  window.calDayClick=(dateStr)=>{
    const dayExp=currentTrip?.expenses?Object.values(currentTrip.expenses).filter(e=>e.date===dateStr):[];
    if(!dayExp.length){document.getElementById('cal-day-detail').innerHTML='';return;}
    const b=currentTrip?.currency||'THB';
    let html=`<div class="section-title">${formatDisplayDate(dateStr)} (${dayExp.length} รายการ)</div>`;
    dayExp.forEach(e=>{html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
      <span style="font-size:20px;">${getCatEmoji(e.category)}</span>
      <div style="flex:1;"><div style="font-size:14px;font-weight:500;">${e.name}</div><div style="font-size:12px;color:var(--text2);">${e.payerName||'?'}</div></div>
      <div style="font-family:'Prompt',sans-serif;font-size:14px;font-weight:600;">${formatMoney(e.amount,e.currency||b)}</div>
    </div>`;});
    document.getElementById('cal-day-detail').innerHTML=html;
  };
  renderMonth(month,year);
}

// ─── SUMMARY ───
function renderSummary() {
  const expenses = currentTrip?.expenses ? Object.values(currentTrip.expenses) : [];
  const base = currentTrip?.currency||'THB';
  const members = getTripMembers();
  const budget = currentTrip?.budget||0;
  const totalSpent = expenses.reduce((s,e)=>s+convertToBase(e.amount||0,e.currency||base,base),0);
  const pct = budget>0?Math.min(100,(totalSpent/budget)*100):0;

  const paid={}, owed={};
  members.forEach(m=>{paid[m.userId]=0;owed[m.userId]=0;});
  expenses.forEach(e=>{
    const amt=convertToBase(e.amount||0,e.currency||base,base);
    const splits=e.splitWith?.length?e.splitWith:members.map(m=>m.userId);
    const valid=splits.filter(uid=>members.find(m=>m.userId===uid));
    const share=amt/(valid.length||1);
    if(paid[e.payerId]!==undefined) paid[e.payerId]+=amt;
    valid.forEach(uid=>{if(owed[uid]!==undefined) owed[uid]+=share;});
  });
  const balance={};
  members.forEach(m=>{balance[m.userId]=(paid[m.userId]||0)-(owed[m.userId]||0);});
  const settlements=minimizeSettlements(balance,members);

  const catTotals={};
  expenses.forEach(e=>{const cat=e.category||'📦 อื่นๆ';catTotals[cat]=(catTotals[cat]||0)+convertToBase(e.amount||0,e.currency||base,base);});
  const catEntries=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const catColors=['#6c8fff','#4ecdc4','#ffd166','#ff6b9d','#a29bfe','#55efc4','#fdcb6e'];

  let html=`<div class="card" style="margin-top:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div><div style="font-size:12px;color:var(--text2);">รวมทั้งหมด</div><div style="font-family:'Prompt',sans-serif;font-size:28px;font-weight:700;color:var(--accent4);">${formatMoney(totalSpent,base)}</div></div>
      <div style="text-align:right;"><div style="font-size:12px;color:var(--text2);">จำนวนรายการ</div><div style="font-family:'Prompt',sans-serif;font-size:22px;font-weight:700;">${expenses.length}</div></div>
    </div>
    ${budget>0?`<div class="progress-bar" style="margin-bottom:6px;"><div class="progress-fill" style="width:${pct}%;background:${pct>85?'var(--danger)':pct>60?'var(--warning)':'var(--success)'}"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);"><span>ใช้ไป ${pct.toFixed(1)}%</span><span>Budget ${formatMoney(budget,base)}</span></div>`:''}
  </div>`;

  html+=`<div class="section-title">ยอดของแต่ละคน</div><div style="padding:0 16px;display:flex;flex-direction:column;gap:8px;">`;
  members.forEach((m,i)=>{
    const b=balance[m.userId]||0, p=paid[m.userId]||0, o=owed[m.userId]||0;
    html+=`<div class="card-sm" style="background:var(--bg3);">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div class="avatar" style="background:${getColor(i)};">${getInitial(m.name)}</div>
        <div style="flex:1;"><div style="font-weight:600;font-size:14px;">${m.name}</div></div>
        <div style="font-family:'Prompt',sans-serif;font-size:16px;font-weight:700;color:${b>=0?'var(--success)':'var(--danger)'};">${b>=0?'+':''}${formatMoney(Math.abs(b),base)}</div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text2);">
        <span>จ่ายไป: <b style="color:var(--text);">${formatMoney(p,base)}</b></span>
        <span>ส่วนแบ่ง: <b style="color:var(--text);">${formatMoney(o,base)}</b></span>
      </div>
    </div>`;
  });
  html+=`</div>`;

  if(settlements.length>0){
    html+=`<div class="section-title">💸 การโอนเงิน</div><div class="card" style="margin:0 16px;">`;
    settlements.forEach(s=>{
      html+=`<div class="settlement-item">
        <div class="avatar avatar-sm" style="background:${getColor(members.findIndex(m=>m.userId===s.from))};">${getInitial(s.fromName)}</div>
        <div style="font-size:13px;font-weight:500;flex:1;">${s.fromName}</div>
        <div style="color:var(--accent);font-size:18px;">→</div>
        <div style="font-family:'Prompt',sans-serif;font-size:14px;font-weight:700;color:var(--accent4);">${formatMoney(s.amount,base)}</div>
        <div style="color:var(--accent);font-size:18px;">→</div>
        <div class="avatar avatar-sm" style="background:${getColor(members.findIndex(m=>m.userId===s.to))};">${getInitial(s.toName)}</div>
        <div style="font-size:13px;font-weight:500;">${s.toName}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(catEntries.length>0){
    html+=`<div class="section-title">📊 หมวดหมู่</div><div class="card" style="margin:0 16px;">
    <canvas id="cat-pie" style="max-width:160px;max-height:160px;margin:0 auto 16px;display:block;"></canvas>`;
    catEntries.forEach(([cat,amt],i)=>{
      const p=totalSpent>0?(amt/totalSpent*100).toFixed(1):0;
      html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
        <div style="width:12px;height:12px;border-radius:50%;background:${catColors[i%catColors.length]};flex-shrink:0;"></div>
        <div style="flex:1;font-size:13px;">${cat}</div>
        <div style="font-size:13px;font-weight:600;">${p}%</div>
        <div style="font-size:12px;color:var(--text2);">${formatMoney(amt,base)}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  html+='<div style="height:16px;"></div>';
  document.getElementById('summary-container').innerHTML=html;

  if(catEntries.length>0){
    const canvas=document.getElementById('cat-pie');
    if(canvas){
      const ctx=canvas.getContext('2d'); canvas.width=160;canvas.height=160;
      let angle=-Math.PI/2;
      catEntries.forEach(([,amt],i)=>{
        const slice=(amt/totalSpent)*Math.PI*2;
        ctx.beginPath();ctx.moveTo(80,80);ctx.arc(80,80,70,angle,angle+slice);
        ctx.fillStyle=catColors[i%catColors.length];ctx.fill();angle+=slice;
      });
      ctx.beginPath();ctx.arc(80,80,38,0,Math.PI*2);ctx.fillStyle='#232736';ctx.fill();
    }
  }
}

function minimizeSettlements(balance,members) {
  const debtors=[],creditors=[];
  members.forEach(m=>{
    const b=balance[m.userId]||0;
    if(b<-0.01) debtors.push({uid:m.userId,name:m.name,amount:-b});
    else if(b>0.01) creditors.push({uid:m.userId,name:m.name,amount:b});
  });
  const result=[]; let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const d=debtors[i],c=creditors[j],amt=Math.min(d.amount,c.amount);
    result.push({from:d.uid,fromName:d.name,to:c.uid,toName:c.name,amount:amt});
    d.amount-=amt;c.amount-=amt;
    if(d.amount<0.01)i++;if(c.amount<0.01)j++;
  }
  return result;
}

// ─── HELPERS ───
function formatMoney(amt,currency) {
  if(isNaN(amt)) return '0';
  const sym={THB:'฿',JPY:'¥',USD:'$',EUR:'€',SGD:'S$',GBP:'£',KRW:'₩',TWD:'NT$'};
  const s=sym[currency]||currency+' ';
  if(Math.abs(amt)>=1000000) return s+(amt/1000000).toFixed(1)+'M';
  if(Math.abs(amt)>=1000) return s+amt.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0});
  return s+amt.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function formatDateRange(start,end){
  if(!start) return 'ไม่ระบุวัน';
  const s=new Date(start).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
  if(!end) return s;
  return s+' – '+new Date(end).toLocaleDateString('th-TH',{day:'numeric',month:'short',year:'2-digit'});
}
function formatDisplayDate(dateStr){
  if(!dateStr||dateStr==='ไม่ระบุวัน') return dateStr;
  return new Date(dateStr).toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'long'});
}
function getCatEmoji(cat){if(!cat)return'📦';return cat.split(' ')[0];}
function getCatBg(cat){
  const map={'🍜':'rgba(255,209,102,0.2)','🏨':'rgba(108,143,255,0.2)','🚌':'rgba(78,205,196,0.2)','🛍️':'rgba(255,107,157,0.2)','🎢':'rgba(162,155,254,0.2)','💊':'rgba(74,222,128,0.2)'};
  return map[getCatEmoji(cat)]||'rgba(255,255,255,0.08)';
}
window.openModal=(id)=>document.getElementById(id).classList.add('open');
window.closeModal=(id)=>document.getElementById(id).classList.remove('open');
window.showToast=(msg)=>{
  const t=document.getElementById('toast');
  const icon=msg.match(/^([^ ]+)/)?.[1]||'✅';
  t.innerHTML=`${icon} <span>${msg.replace(/^[^ ]+ /,'')}</span>`;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500);
};

document.querySelectorAll('.modal-overlay').forEach(o=>{
